apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-node-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise-node-app

  template:
    metadata:
      labels:
        app: enterprise-node-app

    spec:
      containers:
      - name: enterprise-node-app

        image: amalantonypulikkottil/enterprise-node-app:latest

        ports:
        - containerPort: 3000

        imagePullPolicy: Always
